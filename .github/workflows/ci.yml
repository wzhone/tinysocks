name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

env:
  RUST_VERSION: "1.96"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt, llvm-tools-preview

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Audit dependencies
        run: cargo audit

      - name: cargo fmt
        run: cargo +${{ env.RUST_VERSION }} fmt --all -- --check

      - name: cargo clippy
        run: cargo +${{ env.RUST_VERSION }} clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo +${{ env.RUST_VERSION }} test --all --locked

      - name: cargo build
        run: cargo +${{ env.RUST_VERSION }} build --locked

      - name: curl e2e tests
        run: .github/scripts/e2e-curl.sh

      - name: Generate coverage summary
        run: |
          mkdir -p target/llvm-cov
          cargo +${{ env.RUST_VERSION }} llvm-cov --workspace --locked --summary-only | tee target/llvm-cov/coverage-summary.txt
          {
            echo "## Coverage Summary"
            echo
            echo '```text'
            cat target/llvm-cov/coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"


