name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

env:
  RUST_VERSION: "1.96"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: cargo fmt
        run: cargo +${{ env.RUST_VERSION }} fmt --all -- --check

      - name: cargo clippy
        run: cargo +${{ env.RUST_VERSION }} clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo +${{ env.RUST_VERSION }} test --all --locked

      - name: cargo build
        run: cargo +${{ env.RUST_VERSION }} build --locked

      - name: curl e2e tests
        run: .github/scripts/e2e-curl.sh
